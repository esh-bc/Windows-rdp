windows-rdp:
  tags:
    - saas-windows-amd64
  timeout: 5h
  script:
    - |
      Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name fDenyTSConnections -Value 0 -Force
      netsh advfirewall firewall add rule name=RDP dir=in action=allow protocol=TCP localport=3389
      Restart-Service -Name TermService -Force
      $p = ConvertTo-SecureString Password123 -AsPlainText -Force
      New-LocalUser -Name RDP -Password $p -AccountNeverExpires
      Add-LocalGroupMember -Group Administrators -Member RDP
      Add-LocalGroupMember -Group "Remote Desktop Users" -Member RDP
      Invoke-WebRequest -Uri https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi -OutFile C:\ts.msi
      Start-Process msiexec.exe -ArgumentList /i,C:\ts.msi,/quiet,/norestart -Wait
      & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=tskey-auth-khcLqb6wNu11CNTRL-zwiZEn4T48bw7VTTP2778brxktfNeekUZ --hostname=gitlab-rdp
      $ip = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
      Write-Host "IP=$ip User=RDP Pass=Password123"
      while($true){ Start-Sleep 300 }
  shell: powershell
